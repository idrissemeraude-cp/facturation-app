<!doctype html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un compte - iziFacture</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- GSAP & Lucide Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              primary: {
                400: "#4ade80",
                500: "#22c55e",
                600: "#16a34a",
                700: "#15803d",
              },
              dark: "#0f172a",
              darker: "#020617",
            },
            boxShadow: {
              glow: "0 0 20px rgba(22, 163, 74, 0.3)",
              "glow-lg": "0 0 40px rgba(22, 163, 74, 0.2)",
            },
          },
        },
      };
    </script>

    <!-- Custom CSS -->
    <style>
      body {
        background-color: #f8fafc;
        overflow-x: hidden;
      }
      .noise-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 50;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .glass-card-dark {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      .reveal {
        opacity: 0;
        visibility: hidden;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      
      /* Radio card styles */
      .plan-radio:checked + div {
        border-color: #22c55e;
        background-color: rgba(34, 197, 94, 0.05);
      }
      .plan-radio:checked + div .check-icon {
        opacity: 1;
        transform: scale(1);
      }
      .plan-radio:checked + div .plan-border {
        opacity: 1;
      }
    </style>
  </head>
  <body class="text-slate-600 font-sans antialiased selection:bg-primary-500 selection:text-white">
    <div class="noise-bg"></div>

    <main class="min-h-screen flex flex-col w-full relative z-10 py-12 px-4 sm:px-6 lg:px-8 items-center justify-center">
      
      <div class="w-full max-w-6xl reveal active">
        <!-- Header -->
        <div class="mb-10 flex items-center justify-center gap-2 cursor-pointer" onclick="window.location.href = 'index.html'">
          <div class="w-10 h-10 bg-primary-500 rounded-xl flex items-center justify-center text-white shadow-glow">
            <i data-lucide="zap" class="w-6 h-6"></i>
          </div>
          <span class="font-display font-bold text-2xl text-slate-900 tracking-tight">iziFacture</span>
        </div>

        <div class="text-center mb-12">
          <h1 class="text-4xl font-display font-bold text-slate-900 mb-4">Créez votre compte 🚀</h1>
          <p class="text-lg text-slate-500">Choisissez le forfait qui correspond à vos besoins et commencez à facturer.</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Un message d\'authentification a été envoyé à votre adresse email ! Veuillez le consulter pour activer votre compte.');" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col lg:flex-row">
          
          <!-- Left: Pricing Plans -->
          <div class="w-full lg:w-3/5 bg-slate-50 p-8 lg:p-10 border-b lg:border-b-0 lg:border-r border-slate-200">
            <h2 class="text-xl font-bold font-display text-slate-900 mb-6">1. Choisissez votre abonnement</h2>
            
            <div class="space-y-4">
              <!-- Basic Plan -->
              <label class="block relative cursor-pointer group">
                <input type="radio" name="plan" value="basic" class="plan-radio peer sr-only" checked />
                <div class="relative p-6 rounded-2xl border-2 border-slate-200 hover:border-primary-300 transition-all bg-white overflow-hidden">
                  <div class="plan-border absolute inset-0 border-2 border-primary-500 rounded-2xl opacity-0 transition-opacity pointer-events-none"></div>
                  <div class="flex justify-between items-start mb-2">
                    <div>
                      <h3 class="font-bold text-lg text-slate-900">Essentiel</h3>
                      <p class="text-sm text-slate-500">Pour démarrer en douceur</p>
                    </div>
                    <div class="text-right">
                      <span class="text-2xl font-black font-display text-slate-900">0 FCFA</span>
                      <span class="text-sm text-slate-500">/mois</span>
                    </div>
                  </div>
                  <ul class="text-sm text-slate-600 mt-4 space-y-2">
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Jusqu'à 5 factures par jour</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Clients illimités</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Modèles de factures standards</li>
                  </ul>
                  <div class="check-icon absolute top-6 right-6 w-6 h-6 bg-primary-500 rounded-full flex items-center justify-center opacity-0 scale-50 transition-all">
                    <i data-lucide="check" class="w-4 h-4 text-white"></i>
                  </div>
                </div>
              </label>

              <!-- Pro Plan -->
              <label class="block relative cursor-pointer group">
                <input type="radio" name="plan" value="pro" class="plan-radio peer sr-only" />
                <div class="relative p-6 rounded-2xl border-2 border-slate-200 hover:border-primary-300 transition-all bg-white overflow-hidden">
                  <div class="plan-border absolute inset-0 border-2 border-primary-500 rounded-2xl opacity-0 transition-opacity pointer-events-none"></div>
                  <div class="absolute top-0 right-0 bg-primary-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">POPULAIRE</div>
                  <div class="flex justify-between items-start mb-2">
                    <div>
                      <h3 class="font-bold text-lg text-slate-900">Pro</h3>
                      <p class="text-sm text-slate-500">Pour les entrepreneurs actifs</p>
                    </div>
                    <div class="text-right mr-4 lg:mr-0">
                      <span class="text-2xl font-black font-display text-slate-900">5 000 FCFA</span>
                      <span class="text-sm text-slate-500">/mois</span>
                    </div>
                  </div>
                  <ul class="text-sm text-slate-600 mt-4 space-y-2">
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> <span class="font-semibold text-slate-900">Factures illimitées</span> (tout l'abonnement Basique)</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Rappels de paiement automatiques</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Personnalisation avec votre logo</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Support client prioritaire</li>
                  </ul>
                  <div class="check-icon absolute top-6 right-6 w-6 h-6 bg-primary-500 rounded-full flex items-center justify-center opacity-0 scale-50 transition-all">
                    <i data-lucide="check" class="w-4 h-4 text-white"></i>
                  </div>
                </div>
              </label>

              <!-- Pro Max Plan -->
              <label class="block relative cursor-pointer group">
                <input type="radio" name="plan" value="promax" class="plan-radio peer sr-only" />
                <div class="relative p-6 rounded-2xl border-2 border-slate-200 hover:border-primary-300 transition-all bg-white overflow-hidden">
                  <div class="plan-border absolute inset-0 border-2 border-primary-500 rounded-2xl opacity-0 transition-opacity pointer-events-none"></div>
                  <div class="flex justify-between items-start mb-2">
                    <div>
                      <h3 class="font-bold text-lg text-slate-900 bg-gradient-to-r from-slate-900 to-slate-700 bg-clip-text text-transparent">Pro Max</h3>
                      <p class="text-sm text-slate-500">Aucune limite, puissance maximale</p>
                    </div>
                    <div class="text-right">
                      <span class="text-2xl font-black font-display text-slate-900">10 000 FCFA</span>
                      <span class="text-sm text-slate-500">/mois</span>
                    </div>
                  </div>
                  <ul class="text-sm text-slate-600 mt-4 space-y-2">
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> <span class="font-semibold text-slate-900">Toutes les possibilités</span> (tout l'abonnement Pro)</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Multidevises & Multi-entreprises</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> API & Intégrations comptables</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-primary-500"></i> Gestion d'équipe (jusqu'à 5 accès)</li>
                  </ul>
                  <div class="check-icon absolute top-6 right-6 w-6 h-6 bg-primary-500 rounded-full flex items-center justify-center opacity-0 scale-50 transition-all">
                    <i data-lucide="check" class="w-4 h-4 text-white"></i>
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Right: User Details Form -->
          <div class="w-full lg:w-2/5 p-8 lg:p-10 flex flex-col justify-center">
            <h2 class="text-xl font-bold font-display text-slate-900 mb-6">2. Vos informations</h2>
            
            <button type="button" onclick="window.location.href = 'dashboard.html';" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-medium text-slate-700 mb-6 group">
              <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              S'inscrire avec Google
            </button>

            <div class="relative flex items-center justify-center mb-6">
              <div class="border-t border-slate-200 w-full absolute"></div>
              <span class="bg-white px-4 text-xs font-medium text-slate-400 relative">ou avec votre email</span>
            </div>

            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nom complet</label>
                <input type="text" placeholder="Votre nom" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500 outline-none transition-all placeholder-slate-400" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Adresse email</label>
                <input type="email" placeholder="nom@entreprise.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500 outline-none transition-all placeholder-slate-400" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500 outline-none transition-all placeholder-slate-400" required />
              </div>

              <button type="submit" class="w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-medium transition-colors shadow-lg mt-6 relative overflow-hidden group">
                <span class="relative z-10">Finaliser l'inscription</span>
                <div class="absolute inset-0 bg-primary-500 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
              </button>
            </div>
            
            <p class="text-center text-sm text-slate-500 mt-6">
              Déjà un compte ?
              <a href="login.html" class="font-medium text-primary-600 hover:text-primary-700 transition-colors">Se connecter</a>
            </p>
          </div>
        </form>
      </div>
    </main>

    <script>
      lucide.createIcons();
      // Basic GSAP reveal logic
      if (typeof gsap !== "undefined") {
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll(".reveal").forEach((el) => {
          gsap.to(el, {
            scrollTrigger: {
              trigger: el,
              start: "top 85%",
              toggleClass: "active",
              once: true,
            },
          });
        });
      }
    </script>
  </body>
</html>
